## ----- Shadows ----- ##

shadow = true;

shadow-radius = 30;
#shadow-opacity = .6
# shadow-opacity = 0.65;
shadow-offset-x = -30;
shadow-offset-y = -30;
# shadow-offset-x = 0;
# shadow-offset-y = 0;
# @include "../../.cache/wal/picom-shadow-color.conf"
shadow-color = "#000000"

## ----- Fading ----- ##

fading = true;

fade-in-step = 0.5;
fade-out-step = 1;
fade-delta = 10;
# no-fading-openclose = false
# no-fading-destroyed-argb = false

## ----- Transparency ----- ##

# frame-opacity = 1.0;

# inactive-dim-fixed = true

## ----- Corners ----- ##

corner-radius = 0

backend = "egl";
vsync = true;

unredir-if-possible = false;

detect-client-opacity = true;
use-damage = true;


blur: {
  method = "dual_kawase";
  strength = 5;
  background = true;
  background-frame = false;
  background-fixed = true;
  kern = "3x3box";
  # noise = 9;
}
# resize-damage = 2;
rules: (

	{
		# blur-background = false;
		# fade = true;
	},

	{
		match = "window_type = 'normal'";
		# fade = true;	#-fade-switch
		# shadow = true;	#-shadow-switch
	},

	{
		match = "window_type = 'dialog'";
		# shadow = true;	#-shadow-switch
	},

	# {
	# 	match = "window_type = 'tooltip'";
	# 	shadow = false;
	# },
	#
    {
		match = "fullscreen";
		corner-radius = 0;
	},

	{
		match = "window_type = 'dock'";
		corner-radius = 0;
		fade = true;
	},
  {
		match = "class_g = 'dmenu'";
		corner-radius = 0;
		# fade = true;
    # shadow = false;
	},
  {
    match = "class_g = 'Polybar'";
    blur-background = false;
    shadow = false;
	},
	{
		match = "window_type = 'dropdown_menu' || window_type = 'menu' || window_type = 'popup' || window_type = 'popup_menu' || window_type = 'utility'";
		corner-radius = 0;
    blur-background = false;
    shadow = false;
	},

    {
        # Fix shadow related bugs on small UI elements
        match = "window_type = 'menu' || role = 'popup' || role = 'bubble'";
        shadow = false;
        blur-background = false;
    },

	# {
	# 	match = "class_g = 'Alacritty'	|| class_g = 'kitty' || class_g = 'FloaTerm'";
	# 	opacity = 1.0;	#-term-opacity-switch
	# 	blur-background = false;	#-blur-switch
	# },

	# {
	# 	match = "class_g = 'bspwm-scratch' || class_g = 'Updating'";
	# 	opacity = 0.93;
	# 	blur-background = false;	#-blur-switch
	# },
	#  {
	# 	match = "class_g = 'Zen Browser'";
	# 	shadow = false;
	# },

	{
		match = "class_g = 'vxwm'";
		corner-radius = 0;
    # blur-background = false;
	},

@include "picom-animations.conf"
