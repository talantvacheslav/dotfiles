{
    match = "class_g = 'Dunst'";
    animations = (
    {
        triggers = ["close", "hide"];
        preset = "slide-out";
        direction = "up";
        duration = 0.1;
        scale = 0.5;
    },
    {
        triggers = ["open", "show"];
        preset = "slide-in";
        direction: "up";
        duration = 0.2;
        scale = 0.5;
    }
    )
},
